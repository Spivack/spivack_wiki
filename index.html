<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta id="meta-description" name="description" content="">
  <title id="page-title"></title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="site-header">
    <div class="site-header__inner">
      <a href="/" class="site-logo">
        <span class="site-logo__mark">S</span>
        <div class="site-logo__text">
          <span class="site-logo__name">Spivack</span>
          <span class="site-logo__tagline">Surname History &amp; Meaning</span>
        </div>
      </a>
    </div>
  </header>

  <div class="page-layout">
    <main class="article" id="top">

      <div class="article-header">
        <h1 class="article-title" id="article-title"></h1>
        <p class="article-subtitle" id="article-subtitle"></p>
      </div>

      <aside class="infobox" id="infobox" aria-label="Quick facts"></aside>

      <section class="article-lead" id="lead"></section>

      <nav class="toc" id="toc" aria-label="Table of contents">
        <div class="toc__header">Contents</div>
        <ol class="toc__list" id="toc-list"></ol>
      </nav>

      <div id="sections"></div>

      <section id="notable-people">
        <h2>Notable people</h2>
        <p>The following are notable individuals with the surname Spivack:</p>
        <ul class="people-list" id="people-list"></ul>
      </section>

      <section id="references">
        <h2>References</h2>
        <ol class="references-list" id="references-list"></ol>
      </section>

      <div class="article-footer">
        <p class="article-footer__note">
          This article was last updated on <time id="last-updated" datetime=""></time>.
        </p>
      </div>

    </main>
  </div>

  <footer class="site-footer">
    <div class="site-footer__inner">
      <p id="footer-text"></p>
    </div>
  </footer>

  <script src="content.js"></script>
  <script>
    (function render() {

      // ── Meta ──────────────────────────────────────────────
      document.title = CONTENT.meta.title;
      document.getElementById('meta-description').setAttribute('content', CONTENT.meta.description);

      // ── Article header ────────────────────────────────────
      document.getElementById('article-title').textContent = CONTENT.header.title;
      document.getElementById('article-subtitle').textContent = CONTENT.header.subtitle;

      // ── Infobox ───────────────────────────────────────────
      const infobox = document.getElementById('infobox');
      const infoboxRows = CONTENT.infobox.rows
        .filter(row => row.value)
        .map(row => `
          <tr>
            <th scope="row">${row.label}</th>
            <td>${row.value}</td>
          </tr>`)
        .join('');

      infobox.innerHTML = `
        <div class="infobox__header">${CONTENT.infobox.heading}</div>
        <table class="infobox__table">
          <tbody>${infoboxRows}</tbody>
        </table>`;

      // Hide infobox entirely if no rows have values yet
      if (!infoboxRows.trim()) infobox.hidden = true;

      // ── Lead paragraphs ───────────────────────────────────
      const lead = document.getElementById('lead');
      lead.innerHTML = CONTENT.lead
        .filter(p => p)
        .map(p => `<p>${p}</p>`)
        .join('');

      // ── Body sections ─────────────────────────────────────
      const sectionsEl = document.getElementById('sections');

      CONTENT.sections.forEach(function (section) {
        const el = document.createElement('section');
        el.id = section.id;

        let html = `<h2>${section.title}</h2>`;

        section.content.forEach(function (block) {
          if (block.type === 'p' && block.html) {
            html += `<p>${block.html}</p>`;
          } else if (block.type === 'h3') {
            html += `<h3>${block.text}</h3>`;
          } else if (block.type === 'ul' && block.items && block.items.length) {
            html += '<ul>' + block.items.map(i => `<li>${i}</li>`).join('') + '</ul>';
          } else if (block.type === 'ol' && block.items && block.items.length) {
            html += '<ol>' + block.items.map(i => `<li>${i}</li>`).join('') + '</ol>';
          }
        });

        el.innerHTML = html;
        sectionsEl.appendChild(el);
      });

      // ── Notable people ────────────────────────────────────
      const peopleList = document.getElementById('people-list');
      CONTENT.notablePeople
        .filter(p => p.name)
        .forEach(function (person) {
          const li = document.createElement('li');
          li.innerHTML = `<b>${person.name}</b> — ${person.description}`;
          peopleList.appendChild(li);
        });

      // ── References ────────────────────────────────────────
      const refList = document.getElementById('references-list');
      CONTENT.references
        .filter(r => r)
        .forEach(function (ref, i) {
          const li = document.createElement('li');
          li.id = 'ref-' + (i + 1);
          li.innerHTML = ref;
          refList.appendChild(li);
        });

      // ── Footer ────────────────────────────────────────────
      document.getElementById('footer-text').textContent = CONTENT.footer;

      // ── Last updated ──────────────────────────────────────
      const lastUpdatedEl = document.getElementById('last-updated');
      const d = CONTENT.meta.lastUpdated
        ? new Date(CONTENT.meta.lastUpdated + 'T00:00:00')
        : new Date(document.lastModified);
      lastUpdatedEl.setAttribute('datetime', d.toISOString().split('T')[0]);
      lastUpdatedEl.textContent = d.toLocaleDateString('en-US', {
        year: 'numeric', month: 'long', day: 'numeric'
      });

      // ── Table of contents (runs after DOM is built) ───────
      const tocList = document.getElementById('toc-list');
      const headings = document.querySelector('.article').querySelectorAll('h2, h3');
      let h2Count = 0;

      headings.forEach(function (heading) {
        if (!heading.id) {
          heading.id = heading.textContent
            .toLowerCase()
            .replace(/[^a-z0-9]+/g, '-')
            .replace(/^-|-$/g, '');
        }

        const li = document.createElement('li');
        const a = document.createElement('a');
        a.href = '#' + heading.id;

        if (heading.tagName === 'H2') {
          h2Count++;
          li.className = 'toc__item toc__item--h2';
          a.textContent = h2Count + '. ' + heading.textContent;
        } else {
          li.className = 'toc__item toc__item--h3';
          a.textContent = heading.textContent;
        }

        li.appendChild(a);
        tocList.appendChild(li);
      });

    })();
  </script>

</body>
</html>
